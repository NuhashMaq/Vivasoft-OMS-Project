<svg xmlns="http://www.w3.org/2000/svg" width="330" height="62" viewBox="0 0 330 62" role="img" aria-labelledby="title desc">
  <title id="title">Open Backend Readme</title>
  <desc id="desc">Animated button linking to backend readme</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5a2">
        <animate attributeName="stop-color" values="#0ea5a2;#2874f0;#0ea5a2" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#2874f0">
        <animate attributeName="stop-color" values="#2874f0;#0ea5a2;#2874f0" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#11243f" flood-opacity="0.35" />
    </filter>
    <clipPath id="clip">
      <rect x="3" y="3" width="324" height="56" rx="14" ry="14" />
    </clipPath>
  </defs>
  <rect x="3" y="3" width="324" height="56" rx="14" fill="url(#g)" filter="url(#shadow)">
    <animate attributeName="opacity" values="0.93;1;0.93" dur="1.8s" repeatCount="indefinite" />
  </rect>
  <g clip-path="url(#clip)">
    <rect x="-120" y="3" width="90" height="56" fill="#ffffff" fill-opacity="0.2" transform="skewX(-20)">
      <animate attributeName="x" values="-140;380" dur="2.8s" repeatCount="indefinite" />
    </rect>
  </g>
  <rect x="3" y="3" width="324" height="56" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.45" />
  <text x="22" y="39" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">OPEN BACKEND README</text>
  <path d="M302 31h-22m10-8 10 8-10 8" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
</svg>
